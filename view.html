<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <title>Podgląd wpisu</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container navbar-inner">
      <a class="brand" href="index.html">🎵 Śpiewnik</a>
      <div class="nav-actions">
        <a id="newEntryBtn" class="btn btn-primary hidden" href="form.html">+ Nowy wpis</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <a href="index.html" class="back-link">← Do listy</a>
    <div id="viewRoot" class="loading">Ladowanie wpisu...</div>
  </main>

  <div id="deleteModal" class="modal-overlay">
    <div class="modal">
      <h3>Usunąć wpis?</h3>
      <p>Tej operacji nie można cofnąć.</p>
      <div class="modal-actions">
        <button id="cancelDeleteBtn" class="btn btn-outline" type="button">Anuluj</button>
        <button id="confirmDeleteBtn" class="btn btn-danger" type="button">Kasuj</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    const itemId = getParam('id');

    function renderItem(item) {
      const editedLabel = item.updatedAt && item.updatedAt !== item.createdAt
        ? `<span>✏️ Edycja: ${formatDate(item.updatedAt)}</span>`
        : '';
      const adminActions = isAdminMode()
        ? `
            <div>
              <a class="btn btn-secondary" href="form.html?id=${encodeURIComponent(item.id)}">✏️ Edytuj</a>
              <button id="deleteBtn" class="btn btn-danger" type="button">🗑️ Kasuj</button>
            </div>
          `
        : '';

      $('#viewRoot').removeClass('loading').html(`
        <article class="article">
          <h1>${escapeHtml(item.title)}</h1>
          <div class="article-meta">
            ${categoryBadge(item.category)}
            <span>👤 ${escapeHtml(item.author || 'Nieznany autor')}</span>
            <span>📅 Dodano: ${formatDate(item.createdAt)}</span>
            ${editedLabel}
          </div>
          <pre class="poem-content">${escapeHtml(item.content)}</pre>
          <div class="article-actions">
            <a class="btn btn-outline" href="index.html">← Wszystkie wpisy</a>
            ${adminActions}
          </div>
        </article>
      `);
    }

    $(function () {
      if (isAdminMode()) {
        $('#newEntryBtn').removeClass('hidden');
      }

      ensureDataReady(function () {
        if (!itemId) {
          $('#viewRoot').removeClass('loading').html('<div class="empty">Brak identyfikatora wpisu.</div>');
          return;
        }

        apiGetOne(itemId, function (item) {
          document.title = item.title + ' • Śpiewnik';
          renderItem(item);
        }, function () {
          $('#viewRoot').removeClass('loading').html('<div class="empty">Nie znaleziono wpisu.</div>');
        });
      });

      $(document).on('click', '#deleteBtn', function () {
        $('#deleteModal').css('display', 'flex');
      });

      $('#cancelDeleteBtn').on('click', function () {
        $('#deleteModal').hide();
      });

      $('#confirmDeleteBtn').on('click', function () {
        if (!isAdminMode()) {
          $('#deleteModal').hide();
          return;
        }
        apiDelete(itemId, function () {
          $('#deleteModal').hide();
          showToast('Wpis został usunięty.', 'success');
          setTimeout(function () {
            window.location.href = 'index.html';
          }, 700);
        }, function () {
          $('#deleteModal').hide();
          showToast('Nie udało się usunąć wpisu.', 'error');
        });
      });
    });
  </script>
</body>
</html>
