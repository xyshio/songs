<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nowy wpis</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="container navbar-inner">
      <a class="brand" href="index.html">🎵 Śpiewnik</a>
      <div class="nav-actions">
        <a class="btn btn-outline" href="index.html">Lista</a>
      </div>
    </div>
  </nav>

  <main class="container">
    <a id="backLink" href="index.html" class="back-link">← Powrót</a>

    <div class="page-header">
      <h1 id="pageTitle">Nowy wpis</h1>
      <p class="subtitle">Dodaj piosenkę albo wiersz. Formatowanie treści zostanie zachowane.</p>
    </div>

    <div class="form-card">
      <div id="formAlert" class="alert alert-error"></div>
      <form id="entryForm">
        <div class="form-grid">
          <div class="form-group">
            <label for="titleInput">Tytuł *</label>
            <input id="titleInput" class="text-input" type="text" required>
          </div>
          <div class="form-group">
            <label for="authorInput">Autor</label>
            <input id="authorInput" class="text-input" type="text">
          </div>
        </div>

        <div class="form-group">
          <label for="categoryInput">Kategoria</label>
          <select id="categoryInput" class="select-input">
            <option value="piosenka">🎵 Piosenka</option>
            <option value="wiersz">📖 Wiersz</option>
          </select>
        </div>

        <div class="form-group">
          <label for="contentInput">Treść *</label>
          <textarea id="contentInput" class="textarea-input" placeholder="Tutaj wpisz tekst. Spacje, wcięcia i łamanie linii zostaną zachowane."></textarea>
        </div>

        <div class="form-actions">
          <a id="cancelBtn" class="btn btn-outline" href="index.html">Anuluj</a>
          <button id="saveBtn" class="btn btn-primary" type="submit">💾 Zapisz wpis</button>
        </div>
      </form>
    </div>
  </main>

  <div id="toast"></div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    const itemId = getParam('id');

    function showError(message) {
      $('#formAlert').text(message).show();
    }

    function hideError() {
      $('#formAlert').hide().text('');
    }

    function fillForm(item) {
      $('#titleInput').val(item.title);
      $('#authorInput').val(item.author || '');
      $('#categoryInput').val(item.category || 'piosenka');
      $('#contentInput').val(item.content || '');
    }

    $(function () {
      if (!isAdminMode()) {
        $('#pageTitle').text('Brak dostępu');
        $('.subtitle').text('Edycja i dodawanie wpisów są dostępne tylko w trybie admin.');
        $('#entryForm').hide();
        showError('Ta strona jest dostępna tylko wtedy, gdy localStorage zawiera mode=admin.');
        return;
      }

      ensureDataReady(function () {
        if (itemId) {
          $('#pageTitle').text('Edytuj wpis');
          document.title = 'Edytuj wpis';
          $('#backLink, #cancelBtn').attr('href', 'view.html?id=' + encodeURIComponent(itemId));

          apiGetOne(itemId, function (item) {
            fillForm(item);
          }, function () {
            showError('Nie udało się załadować wpisu do edycji.');
          });
        }
      });

      $('#entryForm').on('submit', function (event) {
        event.preventDefault();
        hideError();

        if (!isAdminMode()) {
          showError('Brak uprawnień do zapisu.');
          return;
        }

        const payload = {
          title: $('#titleInput').val(),
          author: $('#authorInput').val(),
          category: $('#categoryInput').val(),
          content: $('#contentInput').val()
        };

        if (!payload.title || !payload.title.trim()) {
          showError('Pole „Tytuł” jest wymagane.');
          return;
        }
        if (!payload.content || !payload.content.trim()) {
          showError('Pole „Treść” jest wymagane.');
          return;
        }

        $('#saveBtn').prop('disabled', true).text('Zapisywanie...');

        const onSuccess = function (item) {
          showToast(itemId ? 'Zapisano zmiany.' : 'Dodano nowy wpis.', 'success');
          setTimeout(function () {
            window.location.href = 'view.html?id=' + encodeURIComponent(item.id);
          }, 700);
        };

        const onError = function (xhr) {
          $('#saveBtn').prop('disabled', false).text('💾 Zapisz wpis');
          showError(xhr.responseJSON?.error || 'Wystąpił błąd zapisu.');
        };

        if (itemId) {
          apiUpdate(itemId, payload, onSuccess, onError);
        } else {
          apiCreate(payload, onSuccess, onError);
        }
      });
    });
  </script>
</body>
</html>
